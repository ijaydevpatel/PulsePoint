  <path d="M0 200C300 150 600 250 1200 200" stroke="#e11d48" stroke-width="0.5" opacity="0.3"/>
  <path d="M0 210C300 160 600 260 1200 210" stroke="#e11d48" stroke-width="1.5" opacity="0.1"/>
  
